<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GANADERO ÉLITE</title>
    <meta name="theme-color" content="#030303">
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#030303;--card:rgba(18,18,18,.85);--border:rgba(255,255,255,.08);--accent:#fbbf24;--text:#fff;--muted:#a1a1aa;--danger:#ef4444;--success:#22c55e;--info:#3b82f6;--warning:#f59e0b}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:14px;font-size:15px;display:flex;justify-content:center}
        .app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:18px}
        header{text-align:center;padding:12px 0}header h1{font-weight:900;font-size:1.75rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav{display:flex;gap:3px;background:var(--card);border-radius:16px;padding:4px;border:1px solid var(--border);position:sticky;top:8px;z-index:100}
        .nav-btn{flex:1;padding:11px 3px;border:none;border-radius:12px;background:transparent;color:var(--muted);font-size:.65rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px}
        .nav-btn.active{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;font-weight:700}
        .card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px 20px;margin-bottom:14px}
        .btn{width:100%;padding:15px;border-radius:18px;border:none;font-size:.8rem;font-weight:700;cursor:pointer;margin-bottom:10px}
        .btn-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000}
        .row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.025)}.row-label{color:var(--muted);font-size:.76rem}.row-val{font-weight:600;font-size:.85rem}
        .capital-value{font-size:1.9rem;font-weight:800;color:var(--accent)}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
        .stat-item{background:rgba(255,255,255,.015);padding:10px 12px;border-radius:12px}
        .estado-simple{display:flex;gap:8px;margin:10px 0}.estado-pildora{flex:1;text-align:center;padding:10px 5px;border-radius:12px;background:rgba(255,255,255,.02)}
        .estado-pildora .num{font-size:1.3rem;font-weight:800}.estado-pildora .lbl{font-size:.55rem;color:var(--muted)}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.animal-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:18px;padding:18px 10px;text-align:center;cursor:pointer}
        .animal-card .name{font-weight:700;text-transform:uppercase;font-size:.7rem}.animal-card .weight{color:var(--accent);font-weight:800;font-size:1rem}
        .hidden{display:none!important}input,select{width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:15px;outline:none}
    </style>
</head>
<body>
    <div class="app">
        <header><h1>🐄 GANADERO ÉLITE</h1><p style="font-size:.6rem;color:var(--muted);">Gestión Inteligente</p></header>
        <nav class="nav" id="nav">
            <button class="nav-btn active" data-p="lote">📊 LOTE</button>
            <button class="nav-btn" data-p="precios">💵 PRECIOS</button>
            <button class="nav-btn" data-p="stock">📦 STOCK</button>
            <button class="nav-btn" data-p="sanidad">💉 SAN</button>
            <button class="nav-btn" data-p="config">⚙️ CONF</button>
        </nav>
        <div id="v-lote" class="page"></div>
        <div id="v-precios" class="hidden page"></div>
        <div id="v-stock" class="hidden page"></div>
        <div id="v-sanidad" class="hidden page"></div>
        <div id="v-config" class="hidden page"></div>
        <div id="v-perfil" class="hidden page"></div>
    </div>
<script>
console.log('🚀 Iniciando GANADERO ÉLITE...');

function fm(n){if(isNaN(n)||n===null)return'0';n=Math.round(n);var s=String(n),r='',c=0;for(var i=s.length-1;i>=0;i--){if(c>0&&c%3===0)r='.'+r;r=s.charAt(i)+r;c++;}return r;}

var DB = {animales:[],aplicaciones:[],precios:{pasto:1200,salvado:2500,melaza:3800,levadura:8000,bicarb:4500,sal:6200,urea:9500},stock:{pasto:500,salvado:200,melaza:50,levadura:10,bicarb:5,sal:2,urea:20},precioKG:9800};
try{var saved=localStorage.getItem('ganadero_elite');if(saved)DB=JSON.parse(saved);}catch(e){console.log('Sin datos guardados');}
function save(){try{localStorage.setItem('ganadero_elite',JSON.stringify(DB));}catch(e){}}

var AL=['pasto','salvado','melaza','levadura','bicarb','sal','urea'];
var IC={pasto:'fa-seedling',salvado:'fa-wheat-awn',melaza:'fa-droplet',levadura:'fa-flask',bicarb:'fa-cubes',sal:'fa-vial-circle-check',urea:'fa-flask-vial'};
var NM={pasto:'Pasto Picado',salvado:'Salvado Trigo',melaza:'Melaza',levadura:'Levadura',bicarb:'Bicarbonato',sal:'Sal Mineral',urea:'UREA'};

function getEtapa(pv){if(pv<150)return{nombre:'Iniciación',icono:'🐮',min:0,max:150,ureaBloqueada:true,color:'#fbbf24'};if(pv<350)return{nombre:'Desarrollo',icono:'🐂',min:150,max:350,ureaBloqueada:false,color:'#60a5fa'};if(pv<500)return{nombre:'Ceba',icono:'🐃',min:350,max:500,ureaBloqueada:false,color:'#fb923c'};return{nombre:'Madurez',icono:'🦬',min:500,max:9999,ureaBloqueada:false,color:'#f87171'};}
function getDiet(pv){if(pv<20)return{pasto:0,salvado:0,sal:0,melaza:0,urea:0,levadura:0,bicarb:0};var d={pasto:pv*.03,salvado:pv*.0045,sal:pv*.2,melaza:0,urea:0,levadura:0,bicarb:0};if(pv>=130&&pv<150)d.melaza=50;if(pv>=150){var f=pv*1.1;d.melaza=Math.max(d.melaza,f*.85);d.levadura=f*.05;d.bicarb=20;d.urea=pv>800?150:f*.1;if(d.urea>150)d.urea=150;}return d;}
function getGMD(h){return h.length<2?0:(h[h.length-1].peso-h[h.length-2].peso)/30;}
function getCostoDiario(pv){var d=getDiet(pv);return(d.pasto||0)*(DB.precios.pasto||0)+(d.salvado||0)*(DB.precios.salvado||0)+((d.melaza||0)/1e3)*(DB.precios.melaza||0)+((d.levadura||0)/1e3)*(DB.precios.levadura||0)+((d.bicarb||0)/1e3)*(DB.precios.bicarb||0)+((d.sal||0)/1e3)*(DB.precios.sal||0)+((d.urea||0)/1e3)*(DB.precios.urea||0);}
function getRendimiento(h){if(h.length<2)return{nivel:'azul',texto:'Registre más pesajes',cm:0,color:'azul'};var act=h[h.length-1].peso,ant=h[h.length-2].peso,cm=((act-ant)/ant)*100;if(act<ant)return{nivel:'gris',texto:'Pérdida',cm:cm,color:'gris'};if(cm>=5)return{nivel:'verde',texto:'Excelente',cm:cm,color:'verde'};if(cm>=3.5)return{nivel:'azul',texto:'Bueno',cm:cm,color:'azul'};if(cm>=2.5)return{nivel:'naranja',texto:'Regular',cm:cm,color:'naranja'};return{nivel:'rojo',texto:'Bajo',cm:cm,color:'rojo'};}

document.getElementById('nav').addEventListener('click',function(e){var b=e.target.closest('button');if(b)goPage(b.getAttribute('data-p'));});

function goPage(p){
    document.getElementById('v-lote').classList.add('hidden');
    document.getElementById('v-precios').classList.add('hidden');
    document.getElementById('v-stock').classList.add('hidden');
    document.getElementById('v-sanidad').classList.add('hidden');
    document.getElementById('v-config').classList.add('hidden');
    document.getElementById('v-perfil').classList.add('hidden');
    document.getElementById('v-'+p).classList.remove('hidden');
    var btns=document.querySelectorAll('#nav .nav-btn');
    for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
    var ab=document.querySelector('#nav button[data-p="'+p+'"]');
    if(ab)ab.classList.add('active');
    if(p==='lote')renderLote();
    if(p==='precios')renderPrecios();
    if(p==='stock')renderStock();
    if(p==='sanidad')renderSanidad();
    if(p==='config')renderConfig();
}

function renderLote(){
    console.log('📊 Renderizando Lote... Animales:',DB.animales.length);
    var price=DB.precioKG,totalKg=0,mez={pasto:0,salvado:0,sal:0,melaza:0,urea:0,levadura:0,bicarb:0};
    var costoTotal=0,est={verde:0,azul:0,naranja:0,rojo:0,gris:0};
    var cards='';
    for(var i=0;i<DB.animales.length;i++){
        var a=DB.animales[i],cp=a.historial[a.historial.length-1].peso;totalKg+=cp;
        var d=getDiet(cp);for(var k in mez)mez[k]+=d[k];costoTotal+=getCostoDiario(cp);
        var r=getRendimiento(a.historial);est[r.nivel]=(est[r.nivel]||0)+1;
        var etapa=getEtapa(cp),sg=r.cm>=0?'+':'';
        cards+='<div class="animal-card" onclick="showProfile('+a.id+')"><span style="font-size:1.5rem;">'+etapa.icono+'</span><div class="name">'+a.nombre+'</div><div class="weight">'+fm(cp)+' kg</div><div style="font-size:.66rem;color:'+(r.cm>=0?'#22c55e':'#ef4444')+'">'+sg+r.cm.toFixed(1)+'%</div></div>';
    }
    var ta=DB.animales.length,prom=ta>0?totalKg/ta:0;
    var html='<div class="card"><div class="row-label" style="font-weight:600;">💰 PRECIO KG EN PIE</div><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:1.1rem;font-weight:800;color:var(--accent);">$</span><input id="inpPKG" type="number" value="'+price+'" style="font-size:1.1rem;font-weight:700;text-align:center;"><span style="font-size:.7rem;color:var(--muted);">COP</span></div><button class="btn btn-gold" onclick="savePKG()" style="margin-top:12px;">✅ ACTUALIZAR</button></div>';
    html+='<button class="btn btn-gold" onclick="toggleAdd()">➕ NUEVO REGISTRO</button>';
    html+='<div id="addF" class="card hidden"><div style="display:flex;flex-direction:column;gap:10px;"><input id="newN" type="text" placeholder="Nombre del Animal"><input id="newW" type="number" placeholder="Peso Inicial (kg)" min="20" max="2000"><button class="btn btn-gold" onclick="addAnimal()">✅ GUARDAR</button></div></div>';
    html+='<div class="card"><div class="row-label" style="font-weight:600;">📊 CAPITAL</div><div class="capital-value">$ '+fm(totalKg*price)+'</div><div class="stats-grid"><div class="stat-item"><div class="row-label">👥 Cabezas</div><div class="row-val">'+ta+'</div></div><div class="stat-item"><div class="row-label">⚖️ Peso Total</div><div class="row-val">'+fm(totalKg)+' kg</div></div><div class="stat-item"><div class="row-label">🔢 Promedio</div><div class="row-val">'+fm(prom)+' kg</div></div></div></div>';
    html+='<div class="card"><div class="row-label" style="font-weight:600;margin-bottom:8px;">📈 ESTADO</div><div class="estado-simple"><div class="estado-pildora" style="color:#22c55e;"><div class="num">'+est.verde+'</div><div class="lbl">Excelente</div></div><div class="estado-pildora" style="color:#3b82f6;"><div class="num">'+est.azul+'</div><div class="lbl">Bueno</div></div><div class="estado-pildora" style="color:#f59e0b;"><div class="num">'+est.naranja+'</div><div class="lbl">Regular</div></div><div class="estado-pildora" style="color:#ef4444;"><div class="num">'+est.rojo+'</div><div class="lbl">Bajo</div></div></div></div>';
    html+='<div class="card"><div class="row-label" style="font-weight:600;">💵 FINANZAS</div><div class="row"><span class="row-label">Alimentación/día</span><span class="row-val">$ '+fm(costoTotal)+'</span></div></div>';
    html+='<div class="card"><div class="row-label" style="font-weight:600;color:var(--accent);margin-bottom:8px;">🍽️ CONSUMO DIARIO</div>';
    for(var z=0;z<AL.length;z++)html+='<div class="row"><span class="row-label"><i class="fa-solid '+IC[AL[z]]+'"></i> '+NM[AL[z]]+'</span><span class="row-val">'+(AL[z]==='pasto'||AL[z]==='salvado'?mez[AL[z]].toFixed(1)+' kg':Math.round(mez[AL[z]])+' g')+'</span></div>';
    html+='</div><div style="font-weight:700;font-size:.68rem;color:var(--muted);margin:16px 0 8px;">🐄 INVENTARIO</div><div class="grid">'+cards+'</div>';
    document.getElementById('v-lote').innerHTML=html;
    console.log('✅ Lote renderizado');
}

function savePKG(){var el=document.getElementById('inpPKG');if(el){DB.precioKG=parseFloat(el.value)||0;save();renderLote();}}
function toggleAdd(){var f=document.getElementById('addF');f.classList.toggle('hidden');}
function addAnimal(){var n=document.getElementById('newN').value.trim(),p=parseFloat(document.getElementById('newW').value);if(!n||n.length<2){alert('Nombre válido');return;}if(isNaN(p)||p<20||p>2000){alert('Peso 20-2000 kg');return;}DB.animales.push({id:Date.now(),nombre:n,historial:[{fecha:new Date().toLocaleDateString(),peso:p}]});save();document.getElementById('newN').value='';document.getElementById('newW').value='';toggleAdd();renderLote();}

function showProfile(id){
    var a=DB.animales.find(function(x){return x.id===id;});if(!a)return;
    var p=a.historial[a.historial.length-1].peso,etapa=getEtapa(p),r=getRendimiento(a.historial),gmd=getGMD(a.historial),cd=getCostoDiario(p);
    var valorActual=p*DB.precioKG,proy30=p+(gmd*30);
    document.getElementById('v-lote').classList.add('hidden');
    document.getElementById('v-perfil').classList.remove('hidden');
    document.getElementById('nav').style.display='none';
    var html='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:14px;"><div><div style="font-weight:900;font-size:1.3rem;color:var(--accent);">'+a.nombre+' '+etapa.icono+'</div><div style="font-size:.6rem;color:var(--muted);">'+etapa.nombre+'</div></div><button class="btn" onclick="deleteAnimal('+id+')" style="width:auto;padding:8px 14px;background:rgba(255,0,0,.06);color:#ef4444;">🗑️</button></div>';
    html+='<div class="row"><span class="row-label">⚖️ Peso</span><span class="row-val">'+fm(p)+' kg</span></div><div class="row"><span class="row-label">💰 Valor</span><span class="row-val" style="color:var(--accent);">$ '+fm(valorActual)+'</span></div>';
    html+='<div class="row"><span class="row-label">📈 GMD</span><span class="row-val">'+gmd.toFixed(2)+' kg/d</span></div><div class="row"><span class="row-label">🔮 Proyección 30d</span><span class="row-val">'+fm(proy30)+' kg</span></div>';
    html+='<div class="row"><span class="row-label">💵 Costo/día</span><span class="row-val">$ '+fm(cd)+'</span></div>';
    html+='<button class="btn btn-gold" onclick="updateWeight('+id+')" style="margin-top:16px;">⚖️ REGISTRAR PESAJE</button>';
    html+='<button class="btn" onclick="closeProfile()" style="background:rgba(255,255,255,.04);color:#fff;">⬅️ VOLVER</button></div>';
    document.getElementById('v-perfil').innerHTML=html;
}

function updateWeight(id){var p=prompt('Nuevo pesaje (kg):');if(!p)return;p=parseFloat(p);if(isNaN(p)||p<20||p>2000){alert('Peso 20-2000 kg');return;}var a=DB.animales.find(function(x){return x.id===id;});if(!a)return;a.historial.push({fecha:new Date().toLocaleDateString(),peso:p});save();showProfile(id);}
function deleteAnimal(id){if(confirm('¿Eliminar?')){DB.animales=DB.animales.filter(function(x){return x.id!==id;});save();closeProfile();}}
function closeProfile(){document.getElementById('v-perfil').classList.add('hidden');document.getElementById('nav').style.display='flex';renderLote();}

function renderPrecios(){
    var html='<div class="card"><div style="font-weight:700;margin-bottom:12px;color:var(--accent);">💵 PRECIOS ALIMENTOS (COP/kg)</div>';
    for(var i=0;i<AL.length;i++)html+='<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);"><i class="fa-solid '+IC[AL[i]]+'"></i><span style="flex:1;font-size:.78rem;">'+NM[AL[i]]+'</span><input id="pr-'+AL[i]+'" type="number" value="'+(DB.precios[AL[i]]||0)+'" style="width:85px;text-align:right;padding:8px;"></div>';
    html+='<button class="btn btn-gold" onclick="savePrecios()" style="margin-top:12px;">✅ GUARDAR</button></div>';
    document.getElementById('v-precios').innerHTML=html;
}
function savePrecios(){for(var i=0;i<AL.length;i++){var el=document.getElementById('pr-'+AL[i]);if(el)DB.precios[AL[i]]=parseFloat(el.value)||0;}save();alert('✅ Precios actualizados');}

function renderStock(){
    var mez={pasto:0,salvado:0,sal:0,melaza:0,urea:0,levadura:0,bicarb:0};
    DB.animales.forEach(function(a){var d=getDiet(a.historial[a.historial.length-1].peso);for(var k in mez)mez[k]+=d[k];});
    var html='<div class="card"><div style="font-weight:700;margin-bottom:12px;color:var(--accent);">📦 STOCK (kg)</div>';
    for(var j=0;j<AL.length;j++){var st=DB.stock[AL[j]]||0,co=mez[AL[j]]||0,cr=(AL[j]==='pasto'||AL[j]==='salvado')?co:co/1e3;html+='<div style="display:flex;align-items:center;gap:8px;padding:10px 0;"><i class="fa-solid '+IC[AL[j]]+'"></i><span style="flex:1;">'+NM[AL[j]]+'</span><input id="st-'+AL[j]+'" type="number" value="'+Math.round(st)+'" style="width:80px;text-align:right;padding:8px;"></div>';}
    html+='<button class="btn btn-gold" onclick="saveStock()" style="margin-top:12px;">✅ GUARDAR</button></div>';
    document.getElementById('v-stock').innerHTML=html;
}
function saveStock(){for(var i=0;i<AL.length;i++){var el=document.getElementById('st-'+AL[i]);if(el)DB.stock[AL[i]]=parseFloat(el.value)||0;}save();alert('✅ Stock actualizado');}

function renderSanidad(){
    var html='<div class="card"><div style="font-weight:700;margin-bottom:12px;color:var(--accent);">💉 SANIDAD</div><p style="font-size:.7rem;color:var(--muted);">Próximamente: gestión de productos veterinarios</p></div>';
    document.getElementById('v-sanidad').innerHTML=html;
}

function renderConfig(){
    var html='<div class="card"><div style="font-weight:700;margin-bottom:12px;color:var(--accent);">⚙️ CONFIGURACIÓN</div>';
    html+='<button class="btn btn-gold" onclick="exportarDatos()">📥 EXPORTAR DATOS</button>';
    html+='<button class="btn" onclick="importarDatos()" style="background:rgba(255,255,255,.04);color:#fff;">📤 IMPORTAR DATOS</button></div>';
    document.getElementById('v-config').innerHTML=html;
}

function exportarDatos(){var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ganadero-elite-respaldo.json';a.click();alert('✅ Datos exportados');}
function importarDatos(){var input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=function(e){var reader=new FileReader();reader.onload=function(e){try{DB=JSON.parse(e.target.result);save();renderLote();alert('✅ Datos importados');}catch(err){alert('❌ Error al importar');}};reader.readAsText(e.target.files[0]);};input.click();}

console.log('✅ Inicializando render...');
renderLote();
</script>
</body>
</html>
